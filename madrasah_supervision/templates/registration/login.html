<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Sistem Pengawasan Madrasah</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }
      .login-card {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        width: 100%;
        max-width: 450px;
      }
      .login-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 30px;
        text-align: center;
      }
      .login-header i {
        font-size: 60px;
        margin-bottom: 20px;
      }
      .login-header h3 {
        margin: 0;
        font-weight: 600;
      }
      .login-header p {
        margin: 10px 0 0;
        opacity: 0.9;
      }
      .login-body {
        padding: 30px;
      }
      .form-control {
        border-radius: 10px;
        padding: 12px 15px;
        border: 1px solid #e0e0e0;
      }
      .form-control:focus {
        box-shadow: none;
        border-color: #667eea;
      }
      .btn-login {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 10px;
        padding: 12px;
        font-weight: 600;
        width: 100%;
        color: white;
      }
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      .footer {
        text-align: center;
        padding: 20px;
        background: #f8f9fa;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <div class="login-header">
        <i class="fas fa-chalkboard-teacher"></i>
        <h3>Sistem Pengawasan Madrasah</h3>
        <p>Login untuk mengakses aplikasi</p>
      </div>
      <div class="login-body">
        {% if messages %} {% for message in messages %}
        <div
          class="alert alert-{{ message.tags }} alert-dismissible fade show"
          role="alert"
        >
          {{ message }}
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
          ></button>
        </div>
        {% endfor %} {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input
                type="text"
                name="username"
                class="form-control"
                required
                autofocus
              />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input
                type="password"
                name="password"
                class="form-control"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-login">
            <i class="fas fa-sign-in-alt me-2"></i> Login
          </button>
        </form>
      </div>
      <div class="footer">
        <p>
          &copy; 2024 Sistem Pengawasan Madrasah | Berbasis Regulasi Kemenag RI
        </p>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
